name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore
        run: dotnet restore ElBruno.ModelContextProtocol.slnx
      - name: Build
        run: dotnet build ElBruno.ModelContextProtocol.slnx --no-restore -c Release
      - name: Test
        run: dotnet test ElBruno.ModelContextProtocol.slnx --no-build -c Release --framework net8.0
      - name: Pack (verify)
        run: dotnet pack src/ElBruno.ModelContextProtocol.MCPToolRouter/ElBruno.ModelContextProtocol.MCPToolRouter.csproj -c Release --no-build --output ./nupkgs
      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkgs/*
