name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore
        run: dotnet restore ElBruno.ModelContextProtocol.slnx --locked-mode
      - name: Build
        run: dotnet build ElBruno.ModelContextProtocol.slnx --no-restore -c Release
      - name: Test
        run: dotnet test ElBruno.ModelContextProtocol.slnx --no-build -c Release --framework net8.0
      - name: Pack (verify)
        run: dotnet pack src/ElBruno.ModelContextProtocol.MCPToolRouter/ElBruno.ModelContextProtocol.MCPToolRouter.csproj -c Release --no-build --output ./nupkgs
      - name: Upload NuGet artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nupkg
          path: ./nupkgs/*
