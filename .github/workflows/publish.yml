name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (leave empty to use csproj version)"
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GIT_REF: ${{ github.ref }}
        run: |
          # Extract from release tag if available
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            VERSION="${GIT_REF#refs/tags/v}"
          elif [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          else
            # Extract from csproj
            VERSION=$(grep -m1 '<Version>' src/ElBruno.ModelContextProtocol.MCPToolRouter/ElBruno.ModelContextProtocol.MCPToolRouter.csproj | grep -oP '(?<=>)[^<]*' || echo "0.1.0")
          fi

          # Validate version format (allow pre-release suffixes like -preview.1)
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Restore
        run: dotnet restore ElBruno.ModelContextProtocol.slnx
      - name: Build
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: dotnet build ElBruno.ModelContextProtocol.slnx -c Release --no-restore -p:Version="$PACKAGE_VERSION"
      - name: Test
        run: dotnet test ElBruno.ModelContextProtocol.slnx -c Release --no-build --framework net8.0
      - name: Pack
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          dotnet pack src/ElBruno.ModelContextProtocol.MCPToolRouter/ElBruno.ModelContextProtocol.MCPToolRouter.csproj \
            -c Release --no-build \
            -p:Version="$PACKAGE_VERSION" \
            --output ./nupkgs
      - name: Verify package contents
        run: |
          echo "📦 Package contents:"
          unzip -l ./nupkgs/*.nupkg | grep -E '(nuget_logo|README|\.dll|\.nuspec)'
      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "./nupkgs/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
